<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ABAT</title>
  <style>
    @font-face {
      font-family: 'JeffScript';
      src: url('fonts/JeffScript.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'BookmanJFPro';
      src: url('fonts/BookmanJFPro.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .landing {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Navbar */
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      padding-top: calc(24px + env(safe-area-inset-top, 0px));
    }

    .navbar-logomark img {
      height: 24px;
      width: auto;
      display: block;
    }

    .navbar-links a {
      font-family: 'BookmanJFPro', serif;
      color: #FEFAEB;
      text-decoration: none;
      font-size: 22px;
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }

    .navbar-links a:hover {
      opacity: 0.75;
    }

    /* Center logo */
    .logo {
      position: relative;
      z-index: 1;
      width: 70%;
      max-width: 1200px;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.4));
    }

    /* Bottom-right quote */
    .quote {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 2;
      font-family: 'JeffScript', cursive;
      color: #FEFAEB;
      font-size: 17px;
      text-align: right;
      max-width: 360px;
      line-height: 1.4;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Tablet */
    @media (max-width: 768px) {
      .navbar {
        padding: 20px 28px;
        padding-top: calc(20px + env(safe-area-inset-top, 0px));
      }

      .navbar-logomark img {
        height: 20px;
      }

      .navbar-links a {
        font-size: 19px;
      }

      .quote {
        font-size: 14px;
        bottom: 32px;
        right: 28px;
        max-width: 280px;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .navbar {
        padding: 16px 20px;
        padding-top: calc(16px + env(safe-area-inset-top, 0px));
      }

      .navbar-logomark img {
        height: 22px;
      }

      .navbar-links a {
        font-size: 18px;
      }

      .quote {
        font-size: 14px;
        bottom: 24px;
        right: 20px;
        max-width: 220px;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="background">
      <img src="images/background.jpg" alt="Background">
    </div>

    <nav class="navbar">
      <div class="navbar-logomark">
        <a href="/"><img src="images/logomark.png" alt="ABAT"></a>
      </div>
      <div class="navbar-links">
        <a href="/contact">contact</a>
      </div>
    </nav>

    <div class="logo">
      <img src="images/logo.png" alt="ABAT Logo">
    </div>

    <div class="quote">
      WE HAVEN'T EVEN HAD OUR<br>FAVORITE MEMORIES YET
    </div>
  </div>
</body>
</html>
